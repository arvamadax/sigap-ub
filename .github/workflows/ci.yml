# SIGAP UB — Continuous Integration
# Memvalidasi setiap push & PR: TypeScript types, syntax backend, dan build Docker.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Job 1: Validasi frontend (TypeScript) ----------
  frontend:
    name: Frontend - TypeScript check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (frontend)
        run: npm ci

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

  # ---------- Job 2: Validasi backend (syntax + dependencies) ----------
  backend:
    name: Backend - Syntax & deps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies (backend)
        run: npm install --no-audit --no-fund

      - name: Syntax check all backend modules
        run: |
          for f in src/app.js src/middleware/auth.js src/routes/*.js; do
            node --check "$f" && echo "OK $f" || (echo "FAIL $f" && exit 1)
          done

      - name: Run triage logic tests
        run: npm test

  # ---------- Job 3: Validasi docker-compose config ----------
  docker:
    name: Docker - Compose validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Copy env template
        run: cp .env.example .env

      - name: Validate docker-compose
        run: docker compose config --quiet
