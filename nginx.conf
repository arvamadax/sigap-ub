# SIGAP UB — Konfigurasi nginx untuk SPA React (fallback ke index.html)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Aset statis dengan cache panjang (di-versioning oleh Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — semua route mengarah ke index.html agar React Router/wizard
    # tetap berfungsi saat user melakukan refresh halaman dalam.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Penanganan error standar
    error_page 500 502 503 504 /50x.html;
}
